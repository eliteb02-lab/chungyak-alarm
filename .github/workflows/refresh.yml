name: Refresh chungyak data

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 07:00 KST (22:00 UTC)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest listings
        env:
          CHUNGYAK_API_KEY: ${{ secrets.CHUNGYAK_API_KEY }}
        run: node scripts/refresh.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet chungyak_data.json; then
            git add chungyak_data.json
            git commit -m "chore: refresh chungyak data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "변경 없음"
          fi
